<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Information Portal Demo - Attendee Search</title>
  <meta name="description" content="Search fictional attendee assignment details for the Event Information Portal Demo." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Event Information Portal Demo - Attendee Search" />
  <meta property="og:description" content="Search fictional attendee assignment details for the public portfolio demo." />
  <meta property="og:image" content="images/demo-icon.svg" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="images/demo-icon.svg" />
  <link rel="stylesheet" href="attendee-search.css?v=20260626" />
</head>
<body>
  <main class="attendee-page">
    <section class="content-card">
      <p class="demo-label">Public Portfolio Demo</p>
      <h1>Event Information Portal Demo - Attendee Search</h1>
      <p class="section-note">Try searching: <button class="sample-name" type="button" data-sample-attendee="Maya Thompson">Maya Thompson</button>, <button class="sample-name" type="button" data-sample-attendee="Daniel Kim">Daniel Kim</button>, or <button class="sample-name" type="button" data-sample-attendee="Olivia Martinez">Olivia Martinez</button></p>
      <div class="search-box">
        <label class="sr-only" for="attendeeSearch">Search by attendee name</label>
        <input class="search-input" id="attendeeSearch" type="search" autocomplete="off" placeholder="Search by attendee name" />
        <div class="autocomplete-list" id="attendeeSuggestions" hidden></div>
      </div>
      <button class="clear-search-button" id="clearAttendeeSearch" type="button">Clear Search</button>
      <div class="attendee-list" id="attendeeList" aria-live="polite">
        <div class="info-box">Enter an attendee name to view sample assignment details.</div>
      </div>
    </section>
  </main>

  <script src="attendee-search.js?v=20260626"></script>
</body>
</html>
